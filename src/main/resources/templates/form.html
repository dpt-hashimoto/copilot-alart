<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>設定入力</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet">
    </head>
    <body>
        <div class="container mt-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0"
                        th:text="${setting.id == null} ? '新規登録' : '編集'">
                    </h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/save}" th:object="${setting}" method="post">
                        <input type="hidden" th:field="*{id}">
    
                        <div class="mb-3">
                            <label class="form-label">ユーザー名</label>
                            <input type="text" class="form-control" th:field="*{userName}">
                        </div>
    
                        <div class="mb-3">
                            <label class="form-label">GitHubログインID</label>
                            <input type="text" class="form-control" th:field="*{gitLoginId}">
                        </div>
    
                        <div class="mb-3">
                            <label class="form-label">GitHubログインパスワード</label>
                            <input type="text" class="form-control" th:field="*{gitLoginPassword}">
                        </div>
    
                        <div class="mb-3">
                            <label class="form-label">メールアドレス</label>
                            <textarea class="form-control"
                                      th:field="*{mailAddress}"
                                      rows="2"></textarea>
                        </div>
    
                        <div class="mb-3">
                            <label class="form-label">備考</label>
                            <textarea class="form-control"
                                      th:field="*{remarks}"
                                      rows="4"></textarea>
                        </div>
    
                        <div class="d-flex gap-2 justify-content-end">
                            <button type="submit" class="btn btn-success">
                                保存
                            </button>
    
                            <button type="button"
                                    class="btn btn-secondary"
                                    onclick="history.back()">
                                戻る
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
